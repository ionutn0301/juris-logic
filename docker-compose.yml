services:
  # ─── Application ─────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: juris-logic
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://juris:juris_secret@postgres:5432/juris_logic?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - juris-network

  # ─── PostgreSQL ──────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: juris-postgres
    environment:
      POSTGRES_USER: juris
      POSTGRES_PASSWORD: juris_secret
      POSTGRES_DB: juris_logic
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U juris -d juris_logic']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - juris-network

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: juris-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - juris-network

volumes:
  postgres_data:
  redis_data:

networks:
  juris-network:
    driver: bridge
